<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>

<style>
body{
margin:0;
background:#70c5ce;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

canvas{
border:2px solid black;
background:#87CEEB;
max-width:95vw;
height:auto;
}
</style>

</head>
<meta name="viewport" content="width=device-width, initial-scale=1">
  
<body>

<canvas id="game" width="400" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let gameState="menu"

let birdY=250
let velocity=0

const gravity=0.15
const jump=-4

let pipes=[]
let score=0
let frame=0

function reset(){
birdY=250
velocity=0
pipes=[]
score=0
frame=0
}

function startGame(){
reset()
gameState="play"
}

function jumpBird(){
if(gameState==="play"){
velocity=jump
}
}

document.addEventListener("keydown",function(){

if(gameState==="menu" || gameState==="gameover"){
startGame()
}else{
jumpBird()
}

})

})
document.addEventListener("touchstart",function(){

if(gameState==="menu" || gameState==="gameover"){
startGame()
}else{
jumpBird()
}

})
document.addEventListener("click",function(){

if(gameState==="menu" || gameState==="gameover"){
startGame()
}else{
jumpBird()
}

})

function update(){

velocity+=gravity
birdY+=velocity

if(birdY>500||birdY<0){
gameState="gameover"
}

frame++

if(frame%120===0){

let gap=150
let top=Math.random()*200+50

pipes.push({
x:400,
top:top,
bottom:top+gap,
scored:false
})

}

pipes.forEach(p=>{

p.x-=2

if(!p.scored && p.x<100){
score++
p.scored=true
}

if(
100+12>p.x &&
100-12<p.x+50 &&
(birdY-12<p.top || birdY+12>p.bottom)
){
gameState="gameover"
}

})

}

function drawBird(){

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(100,birdY,14,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(105,birdY-4,6,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(107,birdY-4,3,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="orange"
ctx.fillRect(112,birdY-2,12,4)

}

function drawPipes(){

ctx.fillStyle="green"

pipes.forEach(p=>{
ctx.fillStyle="#2ecc71"
ctx.fillRect(p.x,0,60,p.top)

ctx.fillStyle="#27ae60"
ctx.fillRect(p.x-3,p.top-10,66,10)

ctx.fillStyle="#2ecc71"
ctx.fillRect(p.x,p.bottom,60,500)

ctx.fillStyle="#27ae60"
ctx.fillRect(p.x-3,p.bottom,66,10)
})

}

function drawScore(){

ctx.fillStyle="black"
ctx.font="24px Arial"
ctx.fillText("Score: "+score,10,30)

}
function drawMenu(){

ctx.fillStyle="black"
ctx.font="36px Arial"
ctx.fillText("FLAPPY BIRD",90,200)

ctx.font="20px Arial"
ctx.fillText("Press any key",140,260)

ctx.font="20px Arial"
ctx.fillText("to start",170,290)

}
function drawGameOver(){

ctx.fillStyle="black"
ctx.font="40px Arial"
ctx.fillText("GAME OVER",90,200)

ctx.font="24px Arial"
ctx.fillText("Score: "+score,150,240)

ctx.font="18px Arial"
ctx.fillText("Click to restart",135,280)

}
function gameLoop(){

ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,400,500)

// mây
ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(80,80,20,0,Math.PI*2)
ctx.arc(100,80,25,0,Math.PI*2)
ctx.arc(120,80,20,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(300,120,20,0,Math.PI*2)
ctx.arc(320,120,25,0,Math.PI*2)
ctx.arc(340,120,20,0,Math.PI*2)
ctx.fill()

// đất
ctx.fillStyle="#ded895"
ctx.fillRect(0,460,400,40)

ctx.fillStyle="#c2b280"
ctx.fillRect(0,450,400,10)

if(gameState==="menu"){

drawBird()
drawMenu()

}
if(gameState==="gameover"){

drawBird()
drawPipes()
drawGameOver()

}

if(gameState==="play"){

update()
drawBird()
drawPipes()
drawScore()

}


requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
