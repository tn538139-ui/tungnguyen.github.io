<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>

<style>
body{
margin:0;
background:#70c5ce;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:#70c5ce;
border:2px solid black;
}
</style>

</head>

<body>

<canvas id="game" width="400" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let birdY = 250
let velocity = 0

const gravity = 0.15
const jump = -4

let pipes = []
let score = 0
let frame = 0

function jumpBird(){
velocity = jump
}

document.addEventListener("keydown",jumpBird)
document.addEventListener("click",jumpBird)

function reset(){
birdY = 250
velocity = 0
pipes = []
score = 0
frame = 0
}

function update(){

velocity += gravity
birdY += velocity

if(birdY > 500 || birdY < 0){
reset()
}

frame++

if(frame % 120 === 0){

let gap = 150
let top = Math.random()*200 + 50

pipes.push({
x:400,
top:top,
bottom:top + gap,
scored:false
})

}

pipes.forEach(p=>{

p.x -= 2

if(!p.scored && p.x < 100){
score++
p.scored = true
}

if(
100+12 > p.x &&
100-12 < p.x+50 &&
(birdY-12 < p.top || birdY+12 > p.bottom)
){
reset()
}

})

}

function draw(){

ctx.clearRect(0,0,400,500)

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(100,birdY,12,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="green"

pipes.forEach(p=>{

ctx.fillRect(p.x,0,50,p.top)
ctx.fillRect(p.x,p.bottom,50,500)

})

ctx.fillStyle="black"
ctx.font="24px Arial"
ctx.fillText("Score: "+score,10,30)

}

function game(){

update()
draw()

requestAnimationFrame(game)

}

game()

</script>

</body>
</html>
