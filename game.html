<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>

<style>
body{
margin:0;
background:#70c5ce;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:#70c5ce;
border:3px solid black;
}
</style>

</head>

<body>

<canvas id="game" width="400" height="500"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {x:80,y:200,v:0};
let pipes = [];
let score = 0;

function spawnPipe(){

let gap = 120;
let top = Math.random()*250+50;

pipes.push({
x:400,
top:top,
bottom:top+gap
});

}

setInterval(spawnPipe,2000);

function update(){

bird.v += 0.5;
bird.y += bird.v;

if(bird.y > 500 || bird.y < 0){
reset();
}

pipes.forEach(p=>{

p.x -= 2;

if(
bird.x+15 > p.x &&
bird.x-15 < p.x+50 &&
(bird.y-15 < p.top || bird.y+15 > p.bottom)
){
reset();
}

if(p.x === 80){
score++;
}

});

}

function draw(){

ctx.clearRect(0,0,400,500);

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(bird.x,bird.y,15,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="green";

pipes.forEach(p=>{

ctx.fillRect(p.x,0,50,p.top);
ctx.fillRect(p.x,p.bottom,50,500);

});

ctx.fillStyle="black";
ctx.font="25px Arial";
ctx.fillText("Score: "+score,10,30);

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

document.addEventListener("keydown",()=>{
bird.v = -8;
});

function reset(){

bird.y = 200;
bird.v = 0;
pipes = [];
score = 0;

}

loop();

</script>

</body>
</html>
