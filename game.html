<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>

<style>
body{
margin:0;
background:#70c5ce;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

canvas{
border:2px solid black;
background:#87CEEB;
}
</style>

</head>

<body>

<canvas id="game" width="400" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let gameState="menu"

let birdY=250
let velocity=0

const gravity=0.15
const jump=-4

let pipes=[]
let score=0
let frame=0

function reset(){
birdY=250
velocity=0
pipes=[]
score=0
frame=0
}

function startGame(){
reset()
gameState="play"
}

function jumpBird(){
if(gameState==="play"){
velocity=jump
}
}

document.addEventListener("keydown",jumpBird)
document.addEventListener("click",function(e){

if(gameState==="menu"){
startGame()
}else{
jumpBird()
}

})

function update(){

velocity+=gravity
birdY+=velocity

if(birdY>500||birdY<0){
gameState="menu"
}

frame++

if(frame%120===0){

let gap=150
let top=Math.random()*200+50

pipes.push({
x:400,
top:top,
bottom:top+gap,
scored:false
})

}

pipes.forEach(p=>{

p.x-=2

if(!p.scored && p.x<100){
score++
p.scored=true
}

if(
100+12>p.x &&
100-12<p.x+50 &&
(birdY-12<p.top || birdY+12>p.bottom)
){
gameState="menu"
}

})

}

function drawBird(){

ctx.fillStyle="yellow"
ctx.fillRect(88,birdY-12,24,24)

ctx.fillStyle="white"
ctx.fillRect(105,birdY-6,8,8)

ctx.fillStyle="black"
ctx.fillRect(108,birdY-3,4,4)

ctx.fillStyle="orange"
ctx.fillRect(112,birdY-2,10,4)

ctx.fillStyle="gold"
ctx.fillRect(90,birdY,10,4)

}

function drawPipes(){

ctx.fillStyle="green"

pipes.forEach(p=>{
ctx.fillRect(p.x,0,50,p.top)
ctx.fillRect(p.x,p.bottom,50,500)
})

}

function drawScore(){

ctx.fillStyle="black"
ctx.font="24px Arial"
ctx.fillText("Score: "+score,10,30)

}

function drawMenu(){

ctx.fillStyle="black"
ctx.font="40px Arial"
ctx.fillText("PLAY",150,250)

ctx.font="20px Arial"
ctx.fillText("Click to start",140,290)

}

function gameLoop(){

ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,400,500)

// mây
ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(80,80,20,0,Math.PI*2)
ctx.arc(100,80,25,0,Math.PI*2)
ctx.arc(120,80,20,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(300,120,20,0,Math.PI*2)
ctx.arc(320,120,25,0,Math.PI*2)
ctx.arc(340,120,20,0,Math.PI*2)
ctx.fill()

if(gameState==="menu"){

drawBird()
drawMenu()

}

if(gameState==="play"){

update()
drawBird()
drawPipes()
drawScore()

}

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
