<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>

<style>

body{
margin:0;
overflow:hidden;
background:#70c5ce;
}

canvas{
display:block;
margin:auto;
background:#70c5ce;
}

</style>

</head>

<body>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {
x:80,
y:150,
gravity:0.5,
lift:-8,
velocity:0
};

let pipes = [];
let frame = 0;
let score = 0;

function drawBird(){

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(bird.x,bird.y,15,0,Math.PI*2);
ctx.fill();

}

function drawPipes(){

for(let i=0;i<pipes.length;i++){

let p = pipes[i];

ctx.fillStyle="green";
ctx.fillRect(p.x,0,50,p.top);

ctx.fillRect(p.x,p.bottom,50,canvas.height);

p.x -= 2;

if(p.x == 78){
score++;
}

if(
bird.x+15 > p.x &&
bird.x-15 < p.x+50 &&
(bird.y-15 < p.top || bird.y+15 > p.bottom)
){
location.reload();
}

}

}

function update(){

bird.velocity += bird.gravity;
bird.y += bird.velocity;

if(bird.y > canvas.height || bird.y < 0){
location.reload();
}

frame++;

if(frame % 100 === 0){

let gap = 140;

let top = Math.random()*300+50;

pipes.push({
x:canvas.width,
top:top,
bottom:top+gap
});

}

}

function drawScore(){

ctx.fillStyle="black";
ctx.font="30px Arial";
ctx.fillText("Score: "+score,10,40);

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

update();
drawBird();
drawPipes();
drawScore();

requestAnimationFrame(loop);

}

document.addEventListener("keydown",function(){

bird.velocity = bird.lift;

});

loop();

</script>

</body>
</html>
