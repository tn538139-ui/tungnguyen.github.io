<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy</title>
<style>
body{
margin:0;
background:#70c5ce;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
canvas{
background:#70c5ce;
border:2px solid black;
}
</style>
</head>

<body>

<canvas id="game" width="400" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let birdY=250
let velocity=0

const gravity=0.15
const jump=-4

function jumpBird(){
velocity=jump
}

document.addEventListener("keydown",jumpBird)
document.addEventListener("click",jumpBird)

function game(){

velocity+=gravity
birdY+=velocity

if(birdY>500){
birdY=250
velocity=0
}

ctx.clearRect(0,0,400,500)

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(100,birdY,12,0,Math.PI*2)
ctx.fill()

requestAnimationFrame(game)

}

game()

</script>

</body>
</html>
</script>

</body>
</html>
