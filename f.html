<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird với Skin</title>
<style>
body{
  margin:0;
  background:#70c5ce;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}
canvas{
  border:2px solid black;
  background:#87CEEB;
  max-width:95vw;
  height:auto;
}
#skinBtn{
  position:absolute;
  top:10px;
  right:10px;
  padding:8px 12px;
  font-size:14px;
}
</style>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<body>

<canvas id="game" width="400" height="500"></canvas>
<button id="skinBtn">Skin: Chim vàng</button>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let gameState="menu"
let birdY=250
let velocity=0

const gravity=0.15
const jump=-4

let pipes=[]
let score=0
let frame=0

// Skin hiện tại
let currentSkin = "bird";

function reset(){
  birdY=250
  velocity=0
  pipes=[]
  score=0
  frame=0
}

function startGame(){
  reset()
  gameState="play"
}

function jumpBird(){
  if(gameState==="play"){
    velocity=jump
  }
}

document.addEventListener("keydown",function(){
  if(gameState==="menu" || gameState==="gameover"){
    startGame()
  }else{
    jumpBird()
  }
})
document.addEventListener("touchstart",function(){
  if(gameState==="menu" || gameState==="gameover"){
    startGame()
  }else{
    jumpBird()
  }
})
document.addEventListener("click",function(){
  if(gameState==="menu" || gameState==="gameover"){
    startGame()
  }else{
    jumpBird()
  }
})

// Nút đổi skin
document.getElementById("skinBtn").addEventListener("click", function(){
  if(currentSkin === "bird"){
    currentSkin = "eagle";
    this.innerText = "Skin: Đại bàng";
  } else {
    currentSkin = "bird";
    this.innerText = "Skin: Chim vàng";
  }
});

function update(){
  velocity+=gravity
  birdY+=velocity

  if(birdY>500||birdY<0){
    gameState="gameover"
  }

  frame++

  if(frame%120===0){
    let gap=150
    let top=Math.random()*200+50
    pipes.push({
      x:400,
      top:top,
      bottom:top+gap,
      scored:false
    })
  }

  pipes.forEach(p=>{
    p.x-=1.7

    if(!p.scored && p.x<100){
      score++
      p.scored=true
    }

    if(
      100+12>p.x &&
      100-12<p.x+50 &&
      (birdY-12<p.top || birdY+12>p.bottom)
    ){
      gameState="gameover"
    }
  })
}

// Vẽ chim vàng
function drawBirdDefault(){
  ctx.fillStyle="#FFD93D"
  ctx.beginPath()
  ctx.arc(100,birdY,14,0,Math.PI*2)
  ctx.fill()

  ctx.fillStyle="#FFC300"
  ctx.beginPath()
  ctx.arc(95,birdY+2,8,0,Math.PI*2)
  ctx.fill()

  ctx.fillStyle="white"
  ctx.beginPath()
  ctx.arc(105,birdY-4,6,0,Math.PI*2)
  ctx.fill()

  ctx.fillStyle="black"
  ctx.beginPath()
  ctx.arc(107,birdY-4,3,0,Math.PI*2)
  ctx.fill()

  ctx.fillStyle="#ff8c42"
  ctx.beginPath()
  ctx.moveTo(112,birdY-2)
  ctx.lineTo(125,birdY)
  ctx.lineTo(112,birdY+3)
  ctx.fill()
}

// Vẽ đại bàng
function drawEagle(){
  // thân nâu
  ctx.fillStyle="#654321";
  ctx.beginPath();
  ctx.arc(100,birdY,16,0,Math.PI*2);
  ctx.fill();

  // đầu trắng
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(115,birdY-8,10,0,Math.PI*2);
  ctx.fill();

  // mắt
  ctx.fillStyle="black";
  ctx.beginPath();
  ctx.arc(118,birdY-8,3,0,Math.PI*2);
  ctx.fill();

  // mỏ vàng
  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.moveTo(125,birdY-6);
  ctx.lineTo(135,birdY-3);
  ctx.lineTo(125,birdY-1);
  ctx.fill();

  // cánh
  ctx.fillStyle="#3d2b1f";
  ctx.beginPath();
  ctx.arc(90,birdY+5,10,0,Math.PI*2);
  ctx.fill();
}

// Hàm vẽ chim theo skin
function drawBird(){
  if(currentSkin === "bird"){
    drawBirdDefault();
  } else {
    drawEagle();
  }
}

function drawPipes(){
  pipes.forEach(p=>{
    ctx.fillStyle="#2ecc71"
    ctx.fillRect(p.x,0,60,p.top)
    ctx.fillStyle="#27ae60"
    ctx.fillRect(p.x-4,p.top-12,68,12)

    ctx.fillStyle="#2ecc71"
    ctx.fillRect(p.x,p.bottom,60,500)
    ctx.fillStyle="#27ae60"
    ctx.fillRect(p.x-4,p.bottom,68,12)
  })
}

function drawScore(){
  ctx.fillStyle="white"
  ctx.font="bold 28px Arial"
  ctx.fillText(score,190,50)
}

function drawMenu(){
  ctx.fillStyle="black"
  ctx.font="36px Arial"
  ctx.fillText("FLAPPY BIRD",90,200)
  ctx.font="20px Arial"
  ctx.fillText("Press any key",140,260)
  ctx.font="20px Arial"
  ctx.fillText("to start",170,290)
}

function drawGameOver(){
  ctx.fillStyle="black"
  ctx.font="40px Arial"
  ctx.fillText("GAME OVER",90,200)
  ctx.font="24px Arial"
  ctx.fillText("Score: "+score,150,240)
  ctx.font="18px Arial"
  ctx.fillText("Click to restart",135,280)
}

function gameLoop(){
  let sky=ctx.createLinearGradient(0,0,0,500)
  sky.addColorStop(0,"#70c5ce")
  sky.addColorStop(1,"#bfe9ff")
  ctx.fillStyle=sky
  ctx.fillRect(0,0,400,500)

  ctx.fillStyle="white"
  ctx.beginPath()
  ctx.arc(80,80,20,0,Math.PI*2)
  ctx.arc(100,80,25,0,Math.PI*2)
  ctx.arc(120,80,20,0,Math.PI*2)
  ctx.fill()

  ctx.beginPath()
  ctx.arc(300,120,20,0,Math.PI*2)
  ctx.arc(320,120,25,0,Math.PI*2)
  ctx.arc(340,120,20,0,Math.PI*2)
  ctx.fill()

  ctx.fillStyle="#ded895"
  ctx.fillRect(0,460,400,40)
  ctx.fillStyle="#c2b280"
  ctx.fillRect(0,450,400,10)

  if(gameState==="menu"){
    drawBird()
    drawMenu()
  }
  if(gameState==="gameover"){
    drawBird()
    drawPipes()
    drawGameOver()
  }
  if(gameState==="play"){
    update()
    drawBird()
    drawPipes()
    drawScore()
  }

  requestAnimationFrame(gameLoop)
}

gameLoop()
</script>
</body>
</html>
